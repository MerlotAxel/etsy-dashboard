<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Boutique Etsy — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#F6F8FA;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:400px;padding:24px;}
.card{background:#fff;border-radius:16px;border:1px solid #E1E3E5;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:40px 36px;}
.logo{text-align:center;margin-bottom:32px;}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#008060,#2C6ECB);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:28px;}
.logo h1{font-size:22px;font-weight:700;color:#202223;}
.logo p{font-size:13px;color:#6D7175;margin-top:4px;}
.tabs{display:flex;background:#F6F8FA;border-radius:8px;padding:3px;margin-bottom:24px;gap:3px;}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:500;color:#6D7175;cursor:pointer;border-radius:6px;transition:all .15s;}
.tab.on{background:#fff;color:#202223;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,.08);}
.section{display:none;}.section.on{display:block;}
.group{margin-bottom:16px;}
label{display:block;font-size:13px;font-weight:500;color:#202223;margin-bottom:6px;}
input[type=email],input[type=password]{width:100%;padding:10px 14px;border:1.5px solid #E1E3E5;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;color:#202223;outline:none;transition:border .15s;}
input[type=email]:focus,input[type=password]:focus{border-color:#2C6ECB;}
.remember{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;}
.remember input[type=checkbox]{width:16px;height:16px;accent-color:#008060;cursor:pointer;}
.remember span{font-size:13px;color:#6D7175;}
.btn{width:100%;padding:12px;background:#008060;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:background .18s;}
.btn:hover{background:#006048;}
.btn:disabled{background:#B5BDC4;cursor:not-allowed;}
.error{background:#FFF4F4;border:1px solid #FEC9C9;border-radius:8px;padding:10px 14px;font-size:13px;color:#D72C0D;margin-bottom:16px;display:none;}
.error.on{display:block;}
.success{background:#E3F1ED;border:1px solid #95C9B4;border-radius:8px;padding:10px 14px;font-size:13px;color:#008060;margin-bottom:16px;display:none;}
.success.on{display:block;}
.spin-wrap{display:none;text-align:center;padding:8px;}.spin-wrap.on{display:block;}
.spinner{width:20px;height:20px;border:2px solid #E1E3E5;border-top-color:#008060;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.footer{text-align:center;margin-top:20px;font-size:12px;color:#94A3B8;}
</style>
</head>
<body>
<div class="wrap">
  <div class="card">
    <div class="logo">
      <div class="logo-icon">🛍️</div>
      <h1>Ma Boutique Etsy</h1>
      <p>Dashboard privé · Axel Merlot</p>
    </div>

    <div class="tabs">
      <div class="tab on" onclick="switchTab('login',this)">Connexion</div>
      <div class="tab" onclick="switchTab('signup',this)">Créer un compte</div>
    </div>

    <div class="error" id="err"></div>
    <div class="success" id="ok"></div>

    <!-- LOGIN -->
    <div class="section on" id="section-login">
      <div class="group">
        <label>Email</label>
        <input type="email" id="l-email" placeholder="axel@example.com" autocomplete="email">
      </div>
      <div class="group">
        <label>Mot de passe</label>
        <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')login()">
      </div>
      <label class="remember">
        <input type="checkbox" id="remember" checked>
        <span>Rester connecté sur cet appareil</span>
      </label>
      <div class="spin-wrap" id="spin-login"><div class="spinner"></div></div>
      <button class="btn" id="btn-login" onclick="login()">Se connecter</button>
    </div>

    <!-- SIGNUP -->
    <div class="section" id="section-signup">
      <div class="group">
        <label>Email</label>
        <input type="email" id="s-email" placeholder="axel@example.com">
      </div>
      <div class="group">
        <label>Mot de passe</label>
        <input type="password" id="s-pass" placeholder="Minimum 6 caractères" onkeydown="if(event.key==='Enter')signup()">
      </div>
      <div class="spin-wrap" id="spin-signup"><div class="spinner"></div></div>
      <button class="btn" id="btn-signup" onclick="signup()">Créer mon compte</button>
    </div>
  </div>
  <div class="footer">🔒 Connexion sécurisée via Supabase Auth</div>
</div>

<script>
const SUPA="https://fnvyeppsaypokvifeblz.supabase.co";
const ANON="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZudnllcHBzYXlwb2t2aWZlYmx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjUyMzYsImV4cCI6MjA5NTkwMTIzNn0.tKpndsTvN3HkaYoxzCcrxD6ad_S5PiLfOcQtyQrttqo";

// Auto-login check — localStorage (rester connecté) ou sessionStorage (session seule)
function checkSession(){
  const s=localStorage.getItem('etsy_sess')||sessionStorage.getItem('etsy_sess');
  if(!s) return;
  try{
    const d=JSON.parse(s);
    if(d.expires_at>Date.now()/1000){ window.location.href='dashboard.html'; }
    else{ localStorage.removeItem('etsy_sess'); sessionStorage.removeItem('etsy_sess'); }
  }catch(e){ localStorage.removeItem('etsy_sess'); }
}
checkSession();

function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelectorAll('.section').forEach(x=>x.classList.remove('on'));
  el.classList.add('on');
  document.getElementById('section-'+t).classList.add('on');
  err('');ok('');
}
function err(m){const e=document.getElementById('err');e.textContent=m;e.classList.toggle('on',!!m);}
function ok(m){const e=document.getElementById('ok');e.textContent=m;e.classList.toggle('on',!!m);}
function setLoad(id,v){document.getElementById('spin-'+id).classList.toggle('on',v);document.getElementById('btn-'+id).disabled=v;}

async function login(){
  const email=document.getElementById('l-email').value.trim();
  const pass=document.getElementById('l-pass').value;
  const remember=document.getElementById('remember').checked;
  if(!email||!pass) return err('Remplis tous les champs');
  setLoad('login',true); err('');
  try{
    const res=await fetch(`${SUPA}/auth/v1/token?grant_type=password`,{
      method:'POST',
      headers:{'apikey':ANON,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const d=await res.json();
    if(d.access_token){
      const sess=JSON.stringify({access_token:d.access_token,expires_at:d.expires_at,email:d.user.email});
      // Rester connecté = localStorage (persiste), sinon sessionStorage (disparaît à la fermeture)
      if(remember) localStorage.setItem('etsy_sess',sess);
      else sessionStorage.setItem('etsy_sess',sess);
      window.location.href='dashboard.html';
    } else {
      err(d.error_description||'Email ou mot de passe incorrect');
    }
  }catch(e){err('Erreur réseau');}
  setLoad('login',false);
}

async function signup(){
  const email=document.getElementById('s-email').value.trim();
  const pass=document.getElementById('s-pass').value;
  if(!email||!pass) return err('Remplis tous les champs');
  if(pass.length<6) return err('Mot de passe minimum 6 caractères');
  setLoad('signup',true); err('');
  try{
    const res=await fetch(`${SUPA}/auth/v1/signup`,{
      method:'POST',
      headers:{'apikey':ANON,'Content-Type':'application/json'},
      body:JSON.stringify({email,password:pass})
    });
    const d=await res.json();
    if(d.id||d.user){
      ok('✅ Compte créé ! Tu peux maintenant te connecter.');
      switchTab('login',document.querySelectorAll('.tab')[0]);
    } else {
      err(d.msg||d.error_description||'Erreur lors de la création');
    }
  }catch(e){err('Erreur réseau');}
  setLoad('signup',false);
}
</script>
</body>
</html>
