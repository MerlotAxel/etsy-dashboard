<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connexion Etsy...</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;background:#F6F8FA;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:16px;border:1px solid #E1E3E5;box-shadow:0 4px 24px rgba(0,0,0,.08);padding:48px 40px;text-align:center;max-width:440px;width:90%;}
.icon{font-size:48px;margin-bottom:16px;}
h1{font-size:20px;font-weight:700;color:#202223;margin-bottom:8px;}
p{font-size:14px;color:#6D7175;margin-bottom:24px;}
.status{padding:12px 20px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:16px;}
.status.ok{background:#E3F1ED;color:#008060;}
.status.err{background:#FFF4F4;color:#D72C0D;}
.status.loading{background:#EBF2FC;color:#2C6ECB;}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 24px;background:#008060;color:#fff;border:none;border-radius:8px;font-family:'Inter',sans-serif;font-size:14px;font-weight:600;cursor:pointer;text-decoration:none;transition:background .18s;}
.btn:hover{background:#006048;}
.spinner{width:24px;height:24px;border:3px solid #E1E3E5;border-top-color:#008060;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
.steps{text-align:left;margin-bottom:20px;}
.step{display:flex;align-items:center;gap:10px;padding:8px 0;font-size:13px;color:#6D7175;border-bottom:1px solid #F0F0F0;}
.step:last-child{border:none;}
.step-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;}
.step-icon.done{background:#E3F1ED;color:#008060;}
.step-icon.loading{background:#EBF2FC;color:#2C6ECB;animation:spin .7s linear infinite;}
.step-icon.wait{background:#F6F8FA;color:#B5BDC4;}
.step-icon.err{background:#FFF4F4;color:#D72C0D;}
</style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon">⏳</div>
  <h1 id="title">Connexion Etsy en cours...</h1>
  <p id="desc">Ne ferme pas cette fenêtre</p>
  <div class="spinner" id="spinner"></div>

  <div class="steps">
    <div class="step">
      <div class="step-icon wait" id="s1">1</div>
      <span id="s1-txt">Réception du code OAuth</span>
    </div>
    <div class="step">
      <div class="step-icon wait" id="s2">2</div>
      <span id="s2-txt">Échange contre les tokens</span>
    </div>
    <div class="step">
      <div class="step-icon wait" id="s3">3</div>
      <span id="s3-txt">Sauvegarde du refresh token</span>
    </div>
    <div class="step">
      <div class="step-icon wait" id="s4">4</div>
      <span id="s4-txt">Auto-refresh configuré ✓</span>
    </div>
  </div>

  <div class="status loading" id="status">Traitement en cours...</div>
  <div id="btn-section" style="display:none">
    <a href="dashboard.html" class="btn">→ Retour au dashboard</a>
  </div>
</div>

<script>
const FUNC = "https://fnvyeppsaypokvifeblz.supabase.co/functions/v1";
const ANON = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZudnllcHBzYXlwb2t2aWZlYmx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMjUyMzYsImV4cCI6MjA5NTkwMTIzNn0.tKpndsTvN3HkaYoxzCcrxD6ad_S5PiLfOcQtyQrttqo";
const CODE_VERIFIER = localStorage.getItem('etsy_code_verifier') || '';

function step(id, state, txt) {
  const el = document.getElementById(id);
  const txtEl = document.getElementById(id+'-txt');
  el.className = 'step-icon ' + state;
  el.textContent = state === 'done' ? '✓' : state === 'err' ? '✗' : state === 'loading' ? '↻' : id.slice(1);
  if(txt) txtEl.textContent = txt;
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    done('err', '❌ Erreur Etsy', 'Etsy a refusé la connexion : ' + error);
    return;
  }
  if (!code) {
    done('err', '❌ Pas de code', 'Aucun code reçu depuis Etsy');
    return;
  }

  // Step 1 — code reçu
  step('s1', 'done', 'Code OAuth reçu ✓');
  step('s2', 'loading', 'Échange en cours...');

  try {
    const res = await fetch(`${FUNC}/etsy-oauth`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'apikey': ANON },
      body: JSON.stringify({ action: 'exchange_token', code, code_verifier: CODE_VERIFIER })
    });
    const data = await res.json();

    if (data.ok && data.token && data.token.access_token) {
      // Step 2 — tokens reçus
      step('s2', 'done', 'Tokens reçus ✓');
      step('s3', 'loading', 'Sauvegarde en Supabase...');

      const hasRefresh = !!data.token.refresh_token;
      if(hasRefresh) {
        step('s3', 'done', 'Refresh token sauvegardé ✓ (auto-refresh actif)');
        step('s4', 'done', 'Auto-refresh configuré — plus jamais de token expiré ✓');
      } else {
        step('s3', 'err', '⚠️ Pas de refresh token — relance OAuth avec offline_access');
        step('s4', 'wait', 'En attente...');
      }

      // Sauvegarde aussi en localStorage pour la session courante
      localStorage.setItem('etsy_access_token', data.token.access_token);
      if(data.token.refresh_token) localStorage.setItem('etsy_refresh_token', data.token.refresh_token);
      localStorage.removeItem('etsy_code_verifier');

      document.getElementById('spinner').style.display = 'none';
      document.getElementById('icon').textContent = hasRefresh ? '🎉' : '⚠️';
      document.getElementById('title').textContent = hasRefresh ? 'Etsy connecté en permanence !' : 'Connecté — mais sans refresh token';
      document.getElementById('desc').textContent = hasRefresh
        ? 'Ton token se rafraîchit automatiquement toutes les heures. Tu n\'auras plus jamais à refaire cette étape.'
        : 'Vérifie que offline_access est dans les scopes Etsy de ton app.';
      document.getElementById('status').className = 'status ' + (hasRefresh ? 'ok' : 'err');
      document.getElementById('status').textContent = hasRefresh ? '✅ Auto-refresh activé pour toujours !' : '⚠️ Refresh token manquant';
      document.getElementById('btn-section').style.display = 'block';

      // Auto redirect après 3s si succès
      if(hasRefresh) setTimeout(() => { window.location.href = 'dashboard.html'; }, 3000);

    } else {
      step('s2', 'err');
      const errMsg = data.token?.error_description || data.error || JSON.stringify(data);
      done('err', '❌ Erreur token', errMsg);
    }
  } catch(e) {
    step('s2', 'err');
    done('err', '❌ Erreur réseau', e.message);
  }
}

function done(type, title, desc) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('icon').textContent = type === 'ok' ? '✅' : '❌';
  document.getElementById('title').textContent = title;
  document.getElementById('desc').textContent = desc;
  document.getElementById('status').className = 'status ' + type;
  document.getElementById('status').textContent = desc;
  document.getElementById('btn-section').style.display = 'block';
}

handleCallback();
</script>
</body>
</html>
